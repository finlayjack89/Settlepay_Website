        - paragraph [ref=e55]: "Whitmore & Co. is a fictional five-person practice of a familiar kind: client work managed in long-serving desktop practice software, the firm’s own books in Xero, and a hundred and twenty retainer clients paying by standing orders the clients themselves had to set up. Standing orders break silently — a client changes bank and the retainer just stops, discovered two months later in a reconciliation. One-off fees went out as invoices and came back as transfers, eventually. A capable team was spending real hours on credit control for predictable, agreed amounts."

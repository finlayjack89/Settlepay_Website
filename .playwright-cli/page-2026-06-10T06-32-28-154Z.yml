      - article [ref=e49]:
        - paragraph [ref=e50]:
          - text: This Cookie Policy explains how cookies and similar technologies are used on the SettlePay website at
          - link "https://settlepay.uk" [ref=e51] [cursor=pointer]:
            - /url: https://settlepay.uk
          - text: (“the site”). It tells you what these technologies are, which ones we use, why, and how you can control them.
        - paragraph [ref=e52]: The site is operated by Finlay Salisbury, trading as SettlePay, of 2b Rodney Street, London, N1 9FS, United Kingdom. SettlePay is a trading name of a sole trader; it is not a limited company.
        - paragraph [ref=e53]: This policy should be read alongside our Privacy Policy, which explains how we handle personal data more generally.
        - heading "The Short Version" [level=2] [ref=e54]
        - paragraph [ref=e55]:
          - text: The SettlePay site is a simple static marketing website. By default it sets
          - strong [ref=e56]: only strictly-necessary cookies and equivalent local storage
          - text: to make the site work and keep it secure. It does
          - strong [ref=e57]: not
          - text: currently set any advertising, marketing, or third-party tracking cookies, and it does
          - strong [ref=e58]: not
          - text: run analytics.
        - paragraph [ref=e59]:
          - text: Because we currently set no non-essential cookies,
          - strong [ref=e60]: you will not see a cookie consent banner
          - text: on the site. If that ever changes (for example, if we add analytics in future), we will update this policy and show a consent banner so that you can choose before any non-essential cookies are set.
        - heading "What Cookies and Similar Technologies Are" [level=2] [ref=e61]
        - paragraph [ref=e62]: A cookie is a small text file that a website asks your browser to store on your device (computer, phone, or tablet). When you return to the site, your browser can send that file back, which lets the site remember certain things.
        - paragraph [ref=e63]: "“Similar technologies” include things that work in a comparable way, such as:"
        - list [ref=e64]:
          - listitem [ref=e65]:
            - strong [ref=e66]: Local storage
            - text: and
            - strong [ref=e67]: session storage
            - text: — small amounts of data your browser keeps for a site, used to remember settings or hold information temporarily.
          - listitem [ref=e68]:
            - strong [ref=e69]: Pixels, tags, and scripts
            - text: — small pieces of code that can read or set the technologies above.
        - paragraph [ref=e70]: In this policy, where we say “cookies” we mean cookies and these similar technologies together, unless we say otherwise.
        - 'heading "The Law: PECR and Consent" [level=2] [ref=e71]'
        - paragraph [ref=e72]: In the UK, the use of cookies and similar technologies is governed mainly by the Privacy and Electronic Communications Regulations (PECR), alongside the UK GDPR where personal data is involved.
        - paragraph [ref=e73]:
          - text: Under PECR, you must be given clear information about cookies and, for most cookies, you must give your consent
          - strong [ref=e74]: before
          - text: "they are set. There is an important exception:"
        - list [ref=e75]:
          - listitem [ref=e76]:
            - strong [ref=e77]: Strictly-necessary cookies are exempt from consent.
            - text: Cookies that are essential to provide a service you have asked for — for example, to make pages load correctly or to keep the site secure — do not require your consent under PECR. We still tell you about them here.
        - paragraph [ref=e78]: All other cookies — for example, analytics or advertising cookies — require your prior consent. As explained above, the site does not currently use any cookies in those categories, so no consent is needed at the moment.
        - heading "Cookie Categories" [level=2] [ref=e79]
        - paragraph [ref=e80]: The table below describes the categories of cookies and similar technologies, and which of them the site uses today.
        - table [ref=e81]:
          - rowgroup [ref=e82]:
            - row "Category Used on this site today? Consent required? What it is for" [ref=e83]:

        - heading "Strictly-Necessary Cookies and Storage" [level=3] [ref=e116]
        - paragraph [ref=e117]: These are the only cookies and storage the site sets by default. They are limited to what is genuinely needed to serve the site and keep it secure — for example, holding short-lived technical information for the duration of your visit. They do not track you across other websites and are not used for advertising or profiling. Because they are strictly necessary, they are exempt from consent under PECR.
        - paragraph [ref=e118]: If you block strictly-necessary cookies and storage in your browser, parts of the site may not work as intended.
        - heading "Web Fonts Loaded From a Third-Party CDN" [level=2] [ref=e119]
        - paragraph [ref=e120]: To display text in the right typefaces, the site may load web fonts from a third-party content delivery network (CDN), such as Fontshare or Google Fonts.
        - paragraph [ref=e121]:
          - text: When your browser requests a font file from one of these services, the request is made directly from your browser to that provider. As with any web request, the provider
          - strong [ref=e122]: may log technical information including your IP address, the type of browser and device you use, and the page that requested the font.
          - text: This is a normal part of how the internet delivers files.
        - paragraph [ref=e123]: "Please note:"
        - list [ref=e124]:
          - listitem [ref=e125]: These font requests are used to deliver the font files themselves.
          - listitem [ref=e126]:
            - text: Loading these fonts does
            - strong [ref=e127]: not
            - text: set cookies on your device for tracking purposes and is not used by us for advertising or profiling.
          - listitem [ref=e128]: The font provider processes the request under its own terms and privacy notice. If you would like to understand how a particular provider handles this technical data, please refer to that provider’s own privacy information.
        - paragraph [ref=e129]: If you prefer not to send any requests to these third-party CDNs, you can use browser settings or extensions that block third-party requests, or browse with the relevant content blocked. The site is designed to remain readable using your device’s standard fonts if web fonts do not load.
        - heading "How to Control or Refuse Cookies" [level=2] [ref=e130]
        - paragraph [ref=e131]: You are in control of cookies and similar technologies. You can accept, refuse, or delete them at any time using your browser settings.
        - paragraph [ref=e132]: "Most browsers let you:"
        - list [ref=e133]:
          - listitem [ref=e134]: See which cookies are stored and delete them individually or all at once.
          - listitem [ref=e135]: Block all cookies, or block only third-party cookies.
          - listitem [ref=e136]: Clear cookies and site data when you close the browser.
          - listitem [ref=e137]: Use a private or incognito window.
        - paragraph [ref=e138]: "Help pages for the most common browsers:"
        - list [ref=e139]:
          - listitem [ref=e140]:
            - strong [ref=e141]: Google Chrome
            - text: — see Chrome’s “Clear, allow and manage cookies” help.
          - listitem [ref=e142]:
            - strong [ref=e143]: Apple Safari
            - text: — see Safari’s “Manage cookies and website data” help.
          - listitem [ref=e144]:
            - strong [ref=e145]: Mozilla Firefox
            - text: — see Firefox’s “Cookies” help.
          - listitem [ref=e146]:
            - strong [ref=e147]: Microsoft Edge
            - text: — see Edge’s “Delete and manage cookies” help.
        - paragraph [ref=e148]: If you use a different browser, look for “cookies”, “privacy”, or “site data” in its settings or help section. On mobile devices, these settings are usually found within the browser app’s own settings.
        - paragraph [ref=e149]: Because the site does not currently set non-essential cookies, there is no on-site setting to change — controlling cookies for this site is done through your browser. If we add a category that needs consent in future, we will provide an on-site way to set and change your choice.
        - heading "Consequences of Disabling Cookies" [level=2] [ref=e150]
        - paragraph [ref=e151]: "The strictly-necessary cookies and storage we use are there to make the site work and keep it secure. If you block or delete them:"
        - list [ref=e152]:
          - listitem [ref=e153]: Some pages or features may not display or behave correctly.
          - listitem [ref=e154]: The site may be unable to remember short-lived technical information during your visit, which can affect how smoothly it works.
        - paragraph [ref=e155]: You will not lose access to any advertising or tracking features by blocking cookies, because we do not use any.
        - heading "What Would Change if We Add Analytics" [level=2] [ref=e156]
        - paragraph [ref=e157]: "If we decide to enable analytics in future, we will:"
        - list [ref=e158]:
          - listitem [ref=e159]: Update this Cookie Policy to describe the analytics tool, the cookies or storage it uses, what they do, and how long they last.
          - listitem [ref=e160]:
            - text: Show a
            - strong [ref=e161]: cookie consent banner
            - text: so you can accept or refuse non-essential cookies
            - strong [ref=e162]: before
            - text: any are set.
          - listitem [ref=e163]:
            - text: Make sure analytics cookies are set
            - strong [ref=e164]: only
            - text: where you have given consent, and provide a way for you to change or withdraw that consent.
        - paragraph [ref=e165]: We will not set analytics or any other non-essential cookies without first asking you.
        - heading "Changes to This Policy" [level=2] [ref=e166]
        - paragraph [ref=e167]: We may update this Cookie Policy from time to time — for example, if we change how the site works or add new technologies. When we do, we will revise the “Last updated” date at the top of this page. If we make a significant change, such as introducing cookies that require consent, we will take reasonable steps to make that clear (for example, through a consent banner). Please check this page from time to time to stay informed.
        - heading "Contact" [level=2] [ref=e168]
        - paragraph [ref=e169]: "If you have any questions about this Cookie Policy or how the site uses cookies and similar technologies, please get in touch:"
        - list [ref=e170]:
          - listitem [ref=e171]:
            - strong [ref=e172]: "Email:"
            - link "hello@settlepay.uk" [ref=e173] [cursor=pointer]:
              - /url: mailto:hello@settlepay.uk
          - listitem [ref=e174]:
            - strong [ref=e175]: "Post:"
            - text: Finlay Salisbury, trading as SettlePay, 2b Rodney Street, London, N1 9FS, United Kingdom
          - listitem [ref=e176]: You can also reach us via the enquiry form on our website.
        - heading "Complaints" [level=3] [ref=e177]
        - paragraph [ref=e178]: "If you have a concern about how your personal data is handled that we cannot resolve, you have the right to complain to the UK Information Commissioner’s Office (ICO):"
        - list [ref=e179]:
          - listitem [ref=e180]:

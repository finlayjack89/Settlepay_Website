      - generic [ref=e54]:
        - paragraph [ref=e55]: "Harbourside Lettings is a fictional three-person coastal agency of a very real shape: a high-street office, around ninety managed tenancies, and a steady stream of applicants. When an applicant was approved, a staff member emailed over the client-account details, the applicant transferred the holding deposit \"when they got home\", and the office checked the bank statement the next morning — and the morning after that. Until the money landed, the property was held on a promise."
        - list [ref=e56]:
          - listitem [ref=e57]:
            - img [ref=e59]

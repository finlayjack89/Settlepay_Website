          - paragraph [ref=e307]: Direct Debit covered around 70% of the UK’s regular bill payments in 2024 (UK Finance) — clients already trust the rail, and every mandate carries the Guarantee.
      - generic [ref=e308]:
        - heading "How These Figures Are Modelled" [level=3] [ref=e309]
        - list [ref=e310]:
          - listitem [ref=e311]: 120 retainer clients previously paying by standing order, with one-off fees invoiced by transfer.
          - listitem [ref=e312]: 40% of small accountancy practices spend over an hour a week chasing overdue invoices; 57% sometimes write debts off rather than chase — GoCardless × FSB survey, 2025 (accountancy subsample n=100).
          - listitem [ref=e313]: 4.9 billion Direct Debits were collected in the UK in 2024, around 70% of regular bill payments — UK Finance, UK Payment Markets 2025.
          - listitem [ref=e314]: Direct Debit also fails far less often than recurring card payments (GoCardless/IDC research) — one reason the retainer uses a mandate rather than a stored card.
        - paragraph [ref=e315]: "Like the business itself, these figures are illustrative: a scenario modelled on published UK industry averages, not measured results from a real client. Your own numbers will depend on your volumes and on how you get paid today."
    - generic [ref=e318]:

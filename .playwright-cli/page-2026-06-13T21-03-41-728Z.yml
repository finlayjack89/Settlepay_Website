              - strong [ref=e62]: 25–35 minutes
              - text: of emails, statement checks and manual matching, spread across two or three working days
          - listitem [ref=e63]:
            - img [ref=e65]
            - generic [ref=e67]:
              - text: Transfers arrived labelled
              - strong [ref=e68]: "\"FLAT DEPOSIT\""
              - text: or a misspelt surname, then someone matched them to the right tenancy by hand in the Excel log
          - listitem [ref=e69]:

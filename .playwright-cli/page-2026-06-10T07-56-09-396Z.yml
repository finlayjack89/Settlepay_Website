            - generic [ref=e478]:
              - heading "The Payment Page" [level=3] [ref=e479]
              - paragraph [ref=e480]: A secure checkout page that lives on your site, branded exactly how you want it — matched to your website's colours and identity, or styled differently if you prefer. Clients pay by card, Apple Pay or Google Pay, and traditional bank transfer stays on the table too. Not everything has to run on cards either — most processors also offer Pay by Bank, which carries a lower fee and still lands in the same dashboard.
          - generic [ref=e481]:
            - generic [ref=e482]: "2"
            - generic [ref=e483]:
              - heading "The Processor Dashboard" [level=3] [ref=e484]
              - paragraph [ref=e485]: We wire your checkout directly to your chosen processor — a trusted, modern name such as Stripe, Adyen or Checkout.com. Every transaction is tracked in real time, and funds settle straight to your business bank account. Already on spreadsheets? That’s fine — your dashboard exports a clean spreadsheet of every payment, so your existing records carry on working.

      - article [ref=e59]:
        - paragraph [ref=e60]:
          - text: This Privacy Policy explains how SettlePay collects, uses, shares and protects your personal data when you visit our website at
          - link "https://settlepay.uk" [ref=e61] [cursor=pointer]:
            - /url: https://settlepay.uk
          - text: ", contact us, or engage us for our services. It also explains your rights under UK data protection law and how to exercise them."
        - paragraph [ref=e62]: We have tried to write this policy in plain English. If anything is unclear, please get in touch using the details below and we will be happy to explain.
        - heading "Who We Are (Data Controller)" [level=2] [ref=e63]
        - paragraph [ref=e64]: "SettlePay is a trading name of Finlay Salisbury, a sole trader. For the purposes of UK data protection law, the data controller responsible for your personal data is:"
        - list [ref=e65]:
          - listitem [ref=e66]:
            - strong [ref=e67]: "Data controller:"
            - text: Finlay Salisbury, trading as SettlePay
          - listitem [ref=e68]:
            - strong [ref=e69]: "Address:"
            - text: 2b Rodney Street, London, N1 9FS, United Kingdom
          - listitem [ref=e70]:
            - strong [ref=e71]: "Email:"
            - link "hello@settlepay.uk" [ref=e72] [cursor=pointer]:
              - /url: mailto:hello@settlepay.uk
          - listitem [ref=e73]:
            - strong [ref=e74]: "Website:"
            - link "https://settlepay.uk" [ref=e75] [cursor=pointer]:
              - /url: https://settlepay.uk
        - paragraph [ref=e76]: SettlePay is registered with the UK Information Commissioner’s Office (ICO) and pays the data-protection fee. Our ICO registration number is [ICO_REGISTRATION_NUMBER].
        - paragraph [ref=e77]: A “data controller” is the person who decides how and why your personal data is processed. Because SettlePay is run by a single founder, when this policy says “we”, “us” or “our”, it means Finlay Salisbury trading as SettlePay.
        - paragraph [ref=e78]: This policy is governed by, and processing is carried out in accordance with, the UK General Data Protection Regulation (UK GDPR) and the Data Protection Act 2018.
        - heading "What Personal Data We Collect" [level=2] [ref=e79]
        - paragraph [ref=e80]: We only collect the personal data we need to respond to you, to provide our services, and to run the business responsibly. The personal data we collect falls into the following categories.
        - heading "Information You Give Us Through the Website Enquiry / Consultation Form" [level=3] [ref=e81]
        - paragraph [ref=e82]: "When you complete our enquiry or consultation form, we collect:"
        - list [ref=e83]:
          - listitem [ref=e84]: your name;
          - listitem [ref=e85]: your business name;
          - listitem [ref=e86]: your email address; and
          - listitem [ref=e87]: the message or details you choose to include (for example, what your business does, the payment problems you want to solve, and any other context you provide).
        - paragraph [ref=e88]: Please only include in the message field the information that is necessary. We ask that you do not send us sensitive personal data or financial details (such as card numbers) through the form.
        - heading "Information in Emails and Other Correspondence" [level=3] [ref=e89]
        - paragraph [ref=e90]:
          - text: If you email us at
          - link "hello@settlepay.uk" [ref=e91] [cursor=pointer]:
            - /url: mailto:hello@settlepay.uk
          - text: ", or otherwise correspond with us, we will receive and keep the contents of that correspondence, your email address, and any personal data you choose to include."
        - heading "Server and Log Data" [level=3] [ref=e92]
        - paragraph [ref=e93]: Like most websites, our hosting and content delivery infrastructure automatically records certain technical information when you visit. This may include your IP address, browser type and version, device information, the pages you view, and the date and time of your visit. This information is generated by our hosting and security providers and is used to keep the website running, secure and available.
        - heading "Cookies and Similar Technologies" [level=3] [ref=e94]
        - paragraph [ref=e95]: Our website may use cookies and similar technologies for essential functions and, where relevant, to understand how the site is used. For full details of the cookies we use and how you can control them, please see our Cookie Policy. Where the law requires it, we will ask for your consent before setting non-essential cookies.
        - paragraph [ref=e96]:
          - text: We do
          - strong [ref=e97]: not
          - text: collect or store cardholder data through this website. Where a payment is taken during a client engagement, it is handled by the client’s chosen payment service provider (see “Who We Share Your Data With” and “What We Do” below).
        - heading "How and Why We Use Your Data, and Our Lawful Basis" [level=2] [ref=e98]
        - paragraph [ref=e99]: Under UK GDPR Article 6, we must have a lawful basis for each way we use your personal data. The table below sets out each purpose and the lawful basis we rely on.
        - table [ref=e100]:
          - rowgroup [ref=e101]:
            - row "Purpose Personal data used Lawful basis (UK GDPR Article 6)" [ref=e102]:
              - columnheader "Purpose" [ref=e103]
              - columnheader "Personal data used" [ref=e104]
              - columnheader "Lawful basis (UK GDPR Article 6)" [ref=e105]
          - rowgroup [ref=e106]:
            - row "To respond to your enquiry, answer your questions and arrange a consultation Name, business name, email address, message details, email correspondence Legitimate interests — it is in our legitimate interest, and yours, to respond to people who contact us about our service. Where you have submitted an enquiry form, you may also have provided consent." [ref=e107]:

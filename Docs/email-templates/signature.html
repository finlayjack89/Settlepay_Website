<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="x-apple-disable-message-reformatting" />
<meta name="color-scheme" content="light dark" />
<meta name="supported-color-schemes" content="light dark" />
<title>SettlePay — Email Signature</title>
<!--
  EMAIL SIGNATURE — paste-target artifact.
  This block is what gets copied into the mail client's signature editor
  (M365 / Outlook, Apple Mail, Gmail). The <style> below is for the standalone
  preview ONLY (≤480px stacking + a light page backdrop) and is STRIPPED on
  paste — the inline layout below stands entirely on its own.

  Before first use: host assets/logo.png and point the <img src> at the absolute
  hosted URL, e.g. https://settlepay.uk/email/logo-badge.png (the SettlePay wordmark
  glyph). Signatures can't adapt to dark mode (the <style> is stripped on paste),
  so this uses a self-contained navy badge (white glyph) that reads on light AND dark backgrounds.
  Relative paths do not survive pasting into a mail client.

  Variables: {{name}} {{role}} {{email}} {{phone}}.
  Optional rows (phone, tagline, CTA) are marked with comments and can be deleted.
-->
<style type="text/css">
  body{ margin:0; padding:0; }
  img{ -ms-interpolation-mode:bicubic; border:0; line-height:100%; outline:none; text-decoration:none; }
  table,td{ mso-table-lspace:0pt; mso-table-rspace:0pt; }
  @media only screen and (max-width:480px){
    .sig-logo-cell{ display:block!important; width:100%!important; padding:0 0 16px 0!important; text-align:left!important; }
    .sig-detail-cell{ display:block!important; width:100%!important; }
  }
</style>
</head>
<body style="margin:0; padding:24px; background-color:#F1F5F9; -webkit-font-smoothing:antialiased;">

<!-- ===== SIGNATURE START (copy from here) ===== -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; max-width:560px; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <tr>
    <!-- Logo -->
    <td class="sig-logo-cell" valign="top" width="120" style="width:120px; padding:0 22px 0 0; vertical-align:top;">
      <a href="https://settlepay.uk" target="_blank" style="text-decoration:none;">
        <img src="https://settlepay.uk/email/logo-badge.png" width="120" height="120" alt="SettlePay" style="display:block; width:120px; height:120px; border:0; outline:none; text-decoration:none; color:#0F172A; font-size:16px; font-weight:700; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;" />
      </a>
    </td>

    <!-- Details -->
    <td class="sig-detail-cell" valign="top" style="vertical-align:top;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr>
          <td style="padding:0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:18px; line-height:1.25; font-weight:700; letter-spacing:-0.01em; color:#0F172A;">{{name}}</td>
        </tr>
        <tr>
          <td style="padding:4px 0 0 0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:14px; line-height:1.4; font-weight:500; color:#64748B;">{{role}}</td>
        </tr>
        <!-- Tagline (optional — delete this row if not wanted) -->
        <tr>
          <td style="padding:6px 0 0 0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:13px; line-height:1.5; font-weight:400; color:#475569;">Bespoke Payment Pages for UK Businesses</td>
        </tr>

        <!-- Thin divider -->
        <tr>
          <td style="padding:14px 0 14px 0;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
              <tr><td style="border-top:1px solid #E2E8F0; font-size:0; line-height:0;" height="1">&nbsp;</td></tr>
            </table>
          </td>
        </tr>

        <!-- Contact line -->
        <tr>
          <td style="padding:0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:14px; line-height:1.7; color:#64748B;">
            <a href="mailto:{{email}}" style="color:#3B82F6; text-decoration:none; font-weight:600;">{{email}}</a>
            <!-- Phone (optional — delete the next span if no phone) -->
            <span style="color:#CBD5E1;">&nbsp;&nbsp;·&nbsp;&nbsp;</span><a href="tel:{{phone}}" style="color:#3B82F6; text-decoration:none; font-weight:600;">{{phone}}</a>
            <span style="color:#CBD5E1;">&nbsp;&nbsp;·&nbsp;&nbsp;</span><a href="https://settlepay.uk" target="_blank" style="color:#3B82F6; text-decoration:none; font-weight:600;">settlepay.uk</a>
          </td>
        </tr>

        <!-- CTA (optional — delete this row if not wanted) -->
        <tr>
          <td style="padding:16px 0 0 0;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
              <tr>
                <td align="center" style="border-radius:100px;" bgcolor="#3B82F6">
<!--[if mso]>
<v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="https://settlepay.uk/#enquire" style="height:40px;v-text-anchor:middle;width:196px;" arcsize="50%" stroke="f" fillcolor="#3B82F6">
<center style="color:#ffffff;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;font-size:14px;font-weight:bold;">Book a Consultation</center>
</v:roundrect>
<![endif]-->
<!--[if !mso]><!-- -->
                  <a href="https://settlepay.uk/#enquire" target="_blank" style="display:inline-block; background-color:#3B82F6; color:#FFFFFF; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:14px; font-weight:700; line-height:40px; text-align:center; text-decoration:none; padding:0 26px; border-radius:100px;">Book a Consultation</a>
<!--<![endif]-->
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Small print -->
        <tr>
          <td style="padding:16px 0 0 0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:11px; line-height:1.6; color:#94A3B8;">SettlePay is a trading name of Finlay Salisbury&nbsp;·&nbsp;2b Rodney Street, London N1 9FS</td>
        </tr>
      </table>
    </td>
  </tr>
</table>
<!-- ===== SIGNATURE END (copy to here) ===== -->

</body>
</html>

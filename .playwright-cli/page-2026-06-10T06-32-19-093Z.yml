        - paragraph [ref=e149]: Where we rely on legitimate interests, we have considered whether our interests are overridden by your interests, rights and freedoms, and we have concluded that the processing is proportionate and is what you would reasonably expect. You can ask us for more information about this balancing assessment, and you have the right to object (see “Your Rights” below).
        - paragraph [ref=e150]: Where we rely on your consent, you can withdraw it at any time without affecting the lawfulness of processing carried out before you withdrew it.
        - heading "Who We Share Your Data With" [level=2] [ref=e151]
        - paragraph [ref=e152]: We do not sell your personal data, and we do not share it for anyone else’s marketing. As a solo business, we work with a small number of carefully chosen service providers (“processors”) who help us run the website and deliver our service. Each is permitted to use your data only on our instructions and is bound by a written data-processing agreement that requires appropriate security and confidentiality.
        - paragraph [ref=e153]: "The categories of processors and recipients we use include:"
        - list [ref=e154]:
          - listitem [ref=e155]:
            - strong [ref=e156]: Website hosting and content delivery (CDN) provider
            - text: — to host the website, serve its content, and keep it fast and secure.
          - listitem [ref=e157]:
            - strong [ref=e158]: Form and email delivery provider
            - text: — to receive enquiry-form submissions and to send and receive email correspondence.
          - listitem [ref=e159]:
            - strong [ref=e160]: Accounting, productivity and communication tools
            - text: — to manage projects, keep proper financial records, and communicate with you (for example, accounting software, email and document tools).
          - listitem [ref=e161]:
            - strong [ref=e162]: Professional advisers
            - text: — such as an accountant, where reasonably necessary, who are themselves bound by confidentiality.
          - listitem [ref=e163]:
            - strong [ref=e164]: Authorities or third parties where required by law
            - text: — for example, if we are legally obliged to disclose information, or to establish, exercise or defend legal claims.
        - heading "Payment Service Providers Are Your Processor, Not Ours" [level=3] [ref=e165]
        - paragraph [ref=e166]:
          - text: This is important. SettlePay is a technology and integration provider, not a payment institution or money-services business.
          - strong [ref=e167]: We never hold, touch or control your funds or your customers’ funds.
          - text: Money settles directly from the payment service provider (PSP) to your own business bank account.
        - paragraph [ref=e168]:
          - text: During a client engagement, we guide you to open
          - strong [ref=e169]: your own
          - text: merchant account with a third-party, FCA-regulated payment service provider — such as Stripe, Adyen, Checkout.com or GoCardless. That PSP processes payments under its
          - strong [ref=e170]: own
          - text: agreement with you and acts as
          - strong [ref=e171]: your
          - text: processor (or controller), not ours. Payments are processed by these FCA-regulated partners; SettlePay is not FCA authorised or regulated.
        - paragraph [ref=e172]:
          - text: SettlePay does
          - strong [ref=e173]: not
          - text: receive, process or store any cardholder data. PCI DSS compliance is handled by your chosen payment processor; using a hosted payment page typically reduces your business’s PCI scope (often to SAQ A). You remain responsible for completing your own PCI Self-Assessment Questionnaire and maintaining appropriate security policies. You should review the privacy policy of any PSP you choose to use.
        - heading "International Transfers" [level=2] [ref=e174]
        - paragraph [ref=e175]: We are based in the United Kingdom and prefer to keep personal data within the UK or the European Economic Area (EEA) where we can. However, some of our service providers may process or store data in countries outside the UK.
        - paragraph [ref=e176]: "Where personal data is transferred outside the UK, we make sure an appropriate safeguard recognised under UK data protection law is in place, such as:"
        - list [ref=e177]:
          - listitem [ref=e178]: a UK “adequacy” decision confirming the destination country provides an adequate level of protection; or
          - listitem [ref=e179]: the UK International Data Transfer Agreement (IDTA), or the EU Standard Contractual Clauses together with the UK International Data Transfer Addendum; together with any additional measures needed to protect your data.
        - paragraph [ref=e180]:
          - text: You can ask us for more information about the safeguards we use for a particular transfer by contacting us at
          - link "hello@settlepay.uk" [ref=e181] [cursor=pointer]:
            - /url: mailto:hello@settlepay.uk
          - text: .
        - heading "How Long We Keep Your Data (Retention)" [level=2] [ref=e182]
        - paragraph [ref=e183]: "We keep personal data only for as long as we need it for the purposes set out in this policy, and then we securely delete or anonymise it. Our typical retention periods are:"
        - list [ref=e184]:
          - listitem [ref=e185]:
            - strong [ref=e186]: Enquiry and consultation data
            - text: "(from people who contact us but do not become clients): kept for up to"
            - strong [ref=e187]: 12 months
            - text: after our last meaningful contact, so we can follow up and refer back to the conversation, then deleted.
          - listitem [ref=e188]:
            - strong [ref=e189]: Client records
            - text: "(records relating to a project we deliver for you, including correspondence and deliverables): kept for the duration of the engagement and for a reasonable period afterwards for support and reference."
          - listitem [ref=e190]:
            - strong [ref=e191]: "Legal, accounting and tax records:"
            - text: kept for approximately
            - strong [ref=e192]: 6 years
            - text: from the end of the relevant financial year (or longer where the law requires), to meet our legal and tax obligations and to defend potential legal claims.
          - listitem [ref=e193]:
            - strong [ref=e194]: "Server and log data:"
            - text: kept for a short period by our hosting and security providers for operational and security purposes, in line with their standard retention.
        - paragraph [ref=e195]: If you ask us to delete your data, we will do so unless we are required or permitted by law to keep it (for example, for tax or accounting records).
        - heading "Your Rights Under UK GDPR" [level=2] [ref=e196]
        - paragraph [ref=e197]: You have the following rights in relation to your personal data. These rights are not absolute and may not apply in every situation, but we will always consider any request you make.
        - list [ref=e198]:
          - listitem [ref=e199]:
            - strong [ref=e200]: Right to be informed
            - text: — to be told how your data is used, which is the purpose of this policy.
          - listitem [ref=e201]:
            - strong [ref=e202]: Right of access
            - text: — to ask for a copy of the personal data we hold about you.
          - listitem [ref=e203]:
            - strong [ref=e204]: Right to rectification
            - text: — to ask us to correct data that is inaccurate or incomplete.
          - listitem [ref=e205]:
            - strong [ref=e206]: Right to erasure
            - text: — to ask us to delete your data in certain circumstances (sometimes called the “right to be forgotten”).
          - listitem [ref=e207]:
            - strong [ref=e208]: Right to restrict processing
            - text: — to ask us to limit how we use your data in certain circumstances.
          - listitem [ref=e209]:
            - strong [ref=e210]: Right to data portability
            - text: — to ask us to provide certain data to you, or to another controller, in a structured, commonly used and machine-readable format, where this right applies.
          - listitem [ref=e211]:
            - strong [ref=e212]: Right to object
            - text: — to object to processing based on legitimate interests, and to object to direct marketing at any time.
          - listitem [ref=e213]:
            - strong [ref=e214]: Right to withdraw consent
            - text: — where we rely on your consent, to withdraw it at any time.
          - listitem [ref=e215]:
            - strong [ref=e216]: Rights relating to automated decision-making
            - text: — see the section below.
        - heading "How to Exercise Your Rights" [level=3] [ref=e217]
        - paragraph [ref=e218]:
          - text: To exercise any of these rights, please contact us at
          - link "hello@settlepay.uk" [ref=e219] [cursor=pointer]:
            - /url: mailto:hello@settlepay.uk
          - text: or by writing to us at the address in the “Who We Are” section. We may ask you to confirm your identity before we act, so that we can be sure we are dealing with the right person.
        - paragraph [ref=e220]: We will respond to your request within one month. If your request is particularly complex, or you have made several requests, we may extend this by up to a further two months, and we will let you know if we need to do so. Exercising your rights is free of charge, although we may charge a reasonable fee or refuse a request that is clearly unfounded or excessive.
        - heading "Automated Decision-Making and Profiling" [level=2] [ref=e221]
        - paragraph [ref=e222]: We do not make decisions about you based solely on automated processing (including profiling) that produce legal effects concerning you or similarly significantly affect you.
        - heading "Children’s Privacy" [level=2] [ref=e223]
        - paragraph [ref=e224]: Our service is a business-to-business (B2B) service aimed at UK businesses, and our website is not directed at children. We do not knowingly collect personal data relating to children. If you believe a child has provided us with personal data, please contact us and we will delete it.
        - heading "Data Security" [level=2] [ref=e225]
        - paragraph [ref=e226]: We take the security of your personal data seriously and use appropriate technical and organisational measures to protect it against unauthorised access, loss, misuse or alteration. These measures include using reputable service providers, encrypted connections (HTTPS) for our website, access controls, and keeping the amount of personal data we hold to the minimum necessary.
        - paragraph [ref=e227]: As noted above, SettlePay never receives or stores cardholder data; payment processing and the related security obligations sit with your chosen FCA-regulated payment service provider. While we do everything reasonable to protect your data, no method of transmission over the internet or method of electronic storage is completely secure, so we cannot guarantee absolute security.
        - heading "Changes to This Policy" [level=2] [ref=e228]
        - paragraph [ref=e229]: We may update this Privacy Policy from time to time, for example to reflect changes to our service, our service providers, or the law. When we do, we will update the “Last updated” date at the top of this page. We encourage you to review this policy periodically. If we make a significant change, we will take reasonable steps to bring it to your attention.
        - heading "Complaints and How to Contact the ICO" [level=2] [ref=e230]
        - paragraph [ref=e231]:
          - text: If you have any concerns about how we handle your personal data, please contact us first at
          - link "hello@settlepay.uk" [ref=e232] [cursor=pointer]:
            - /url: mailto:hello@settlepay.uk
          - text: so we can try to put things right.
        - paragraph [ref=e233]: "You also have the right to make a complaint to the UK Information Commissioner’s Office (ICO), which is the supervisory authority for data protection in the UK:"
        - list [ref=e234]:
          - listitem [ref=e235]:
            - strong [ref=e236]: Information Commissioner’s Office
          - listitem [ref=e237]: Wycliffe House, Water Lane, Wilmslow, Cheshire, SK9 5AF, United Kingdom
          - listitem [ref=e238]:
            - text: "Website:"
            - link "https://ico.org.uk" [ref=e239] [cursor=pointer]:
              - /url: https://ico.org.uk
        - paragraph [ref=e240]: We would, however, appreciate the chance to address your concerns before you approach the ICO.

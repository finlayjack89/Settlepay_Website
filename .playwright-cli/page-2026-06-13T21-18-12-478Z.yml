      - paragraph [ref=e113]: "This is the honest IT shape of most small agencies: a closed CRM, an inbox and a spreadsheet. So the build works alongside the CRM rather than inside it — staff turn a tenancy reference into a branded payment link in seconds, and the matching that used to happen by hand travels inside the payment itself. No integration was promised that the CRM could not deliver."

      - generic [ref=e54]:
        - paragraph [ref=e55]: "Harbourside Lettings is a fictional three-person coastal agency of a very real shape: a high-street office, around ninety managed tenancies, and a steady stream of applicants. When an applicant was approved, a staff member emailed over the client-account details, the applicant transferred the holding deposit \"when they got home\", and the office checked the bank statement the next morning — and the morning after that. Until the money landed, the property was held on a promise."
        - list [ref=e56]:
          - listitem [ref=e57]:
            - img [ref=e59]
            - generic [ref=e61]:
              - text: Each deposit collected by transfer meant
              - strong [ref=e62]: 25–35 minutes
              - text: of emails, statement checks and manual matching, spread across two or three working days
          - listitem [ref=e63]:
            - img [ref=e65]
            - generic [ref=e67]:
              - text: Transfers arrived labelled
              - strong [ref=e68]: "\"FLAT DEPOSIT\""
              - text: or a misspelt surname, then someone matched them to the right tenancy by hand in the Excel log
          - listitem [ref=e69]:
            - img [ref=e71]
            - generic [ref=e73]:
              - text: The holding deposit starts a
              - strong [ref=e74]: statutory 15-day
              - text: deadline for agreement under the Tenant Fees Act — days lost waiting for a transfer came straight out of that window
          - listitem [ref=e75]:
            - img [ref=e77]
            - generic [ref=e79]: While the deposit was "on its way", the property sat informally reserved — applicants could simply go quiet and the listing went stale

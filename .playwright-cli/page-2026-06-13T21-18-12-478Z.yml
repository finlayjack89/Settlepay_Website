      - generic [ref=e351]:
        - heading "How These Figures Are Modelled" [level=3] [ref=e352]
        - list [ref=e353]:
          - listitem [ref=e354]: Roughly 40 new tenancies a year, with 25–35 minutes of combined staff time per transfer-collected deposit — our stated assumption, as no published per-deposit figure exists.
          - listitem [ref=e355]: Holding deposits are capped at one week’s rent, with a default 15-day deadline for agreement — Tenant Fees Act 2019, GOV.UK statutory guidance.
          - listitem [ref=e356]: Staff time costed at typical UK administrator pay of £12–£14 an hour (Indeed and Reed salary data, 2025).
        - paragraph [ref=e357]: "Like the business itself, these figures are illustrative: a scenario modelled on published UK industry averages, not measured results from a real client. Your own numbers will depend on your volumes and on how you get paid today."

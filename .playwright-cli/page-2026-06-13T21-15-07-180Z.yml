        - heading "How These Figures Are Modelled" [level=3] [ref=e351]
        - list [ref=e352]:
          - listitem [ref=e353]: ~70 appointments a month for one practitioner, with deposits previously arriving by transfer and checked against the diary by hand — the 2-hours-a-week reception figure is our stated assumption.
          - listitem [ref=e354]: "Scale of the no-show problem: 8.4 million NHS outpatient appointments were missed in 2024–25 (NHS Digital); the NHS costs a missed appointment at around £160. The effect of deposits is reported by practices rather than measured in published UK studies, so we state it qualitatively."
          - listitem [ref=e355]: Reception time costed at typical UK administrator pay of £12–£14 an hour (2025 salary data).
        - paragraph [ref=e356]: "Like the business itself, these figures are illustrative: a scenario modelled on published UK industry averages, not measured results from a real client. Your own numbers will depend on your volumes and on how you get paid today."

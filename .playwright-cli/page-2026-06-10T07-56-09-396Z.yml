            - generic [ref=e488]:
              - heading "Automated Reconciliation" [level=3] [ref=e489]
              - paragraph [ref=e490]: We build digital bridges directly into your accounting software (like Xero or QuickBooks). When a client pays, the system instantly marks that invoice as “Paid”.

        - heading "How These Figures Are Modelled" [level=3] [ref=e393]
        - list [ref=e394]:
          - listitem [ref=e395]: ~30 invoices a month on 14-day terms, with roughly a third previously needing at least one chase — consistent with Xero data that about half of UK small-business invoices are paid late.
          - listitem [ref=e396]: UK businesses affected by late payment average 86 hours a year of staff time chasing it — DBT / Office of the Small Business Commissioner research, 2025.
          - listitem [ref=e397]: "\"Paid up to twice as fast\" with online payment options — Xero platform data, cited as Xero’s."
          - listitem [ref=e398]: "Remote purchase (card-not-present) fraud: just under £400 million lost in 2024, the largest category of UK card fraud — UK Finance Annual Fraud Report 2025. A hosted payment page also keeps card data away from the business entirely, with PCI DSS handled by the processor."
        - paragraph [ref=e399]: "Like the business itself, these figures are illustrative: a scenario modelled on published UK industry averages, not measured results from a real client. Your own numbers will depend on your volumes and on how you get paid today."
    - generic [ref=e402]:

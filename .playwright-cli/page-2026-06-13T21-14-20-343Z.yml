      - generic [ref=e376]:
        - heading "How It Connects" [level=2] [ref=e377]
        - paragraph [ref=e378]: Behind the page, every payment carries its reference — an invoice number, tenancy, lot or mandate — so it is matched back to the business's records automatically, reminders go out on schedule instead of from someone's evening to-do list, and the books update themselves. Funds settle directly from the processor to the business's own bank account; SettlePay never holds funds. Payments are processed by FCA-regulated partners.
    - generic [ref=e381]:
